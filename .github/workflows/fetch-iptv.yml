name: IPTV Auto Fetch

on:
  schedule:
    - cron: "0 */6 * * *"   # 每6小时运行一次
  workflow_dispatch:         # 支持手动触发

jobs:
  fetch-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: 执行 IPTV 源抓取
        run: |
          python scripts/fetch_sources.py

      - name: 检查文件变化并提交
        run: |
          git config user.name "iptv-bot"
          git config user.email "iptv-bot@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "chore: auto-update IPTV sources $(date +'%Y-%m-%d %H:%M')"
          git push
